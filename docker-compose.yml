version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: contato_seguro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contato_seguro_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
