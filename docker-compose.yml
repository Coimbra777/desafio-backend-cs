services:
  postgres:
    image: postgres:16
    container_name: contato_seguro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contato_seguro_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contato_seguro_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: contato_seguro_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/contato_seguro_db?schema=public
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
